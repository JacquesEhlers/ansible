- name: Install Docker prerequisites
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes

- name: Ensure keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present
    update_cache: yes

- name: Install Docker packages
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Ensure Docker service is enabled and started
  service:
    name: docker
    state: started
    enabled: true

# Allow users to run docker without sudo
- name: Add ansible user to docker group
  user:
    name: ansible
    groups: docker
    append: yes

- name: Add jacques user to docker group
  user:
    name: jacques
    groups: docker
    append: yes

# Check swarm state (so we don't reinitialize every run)
- name: Check if swarm is already active
  command: docker info -f '{{ "{{.Swarm.LocalNodeState}}" }}'
  register: swarm_state
  changed_when: false

# Initialize swarm if not active
- name: Initialize Docker Swarm
  command: docker swarm init --advertise-addr {{ ansible_default_ipv4.address }}
  when: swarm_state.stdout != "active"