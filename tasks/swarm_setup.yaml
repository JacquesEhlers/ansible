---
# Prep + install Docker Engine (Docker CE) + initialize Swarm (single-node)

- name: Ensure apt prerequisites are installed
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes

- name: Ensure /etc/apt/keyrings exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: true

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_facts.architecture }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_facts.distribution_release }} stable
    filename: docker
    state: present
    update_cache: yes

- name: Install Docker Engine packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Ensure Docker service is enabled and started
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

# Optional: allow your 'ansible' user to run docker without sudo.
# In AWX jobs you're likely using become anyway, but this is convenient for SSH sessions.
- name: Add ansible_user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

# --- Swarm init (idempotent) ---
- name: Check if this node is already in a swarm
  ansible.builtin.command: docker info -f '{{ "{{.Swarm.LocalNodeState}}" }}'
  register: swarm_state
  changed_when: false

- name: Initialize Docker Swarm (single-node manager)
  ansible.builtin.command: docker swarm init --advertise-addr {{ ansible_default_ipv4.address }}
  when: swarm_state.stdout != "active"